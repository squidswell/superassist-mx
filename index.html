<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SuperAssist MX</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:rgba(255,255,255,0.08);--text:#f0f2f8;--muted:#8b90a8;--red:#ff4d4d;--red-bg:rgba(255,77,77,0.12);--amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);--green:#34d399;--green-bg:rgba(52,211,153,0.12);--blue:#60a5fa;--blue-bg:rgba(96,165,250,0.12);--purple:#a78bfa;--purple-bg:rgba(167,139,250,0.12)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;padding-bottom:120px}
.topbar{padding:14px 16px 10px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg);z-index:100}
.topbar h1{font-size:15px;font-weight:600;letter-spacing:0.02em}
.topbar p{font-size:11px;color:var(--muted);margin-top:1px}
.topbar-right{font-size:11px;color:var(--muted);text-align:right}
.tab-bar{display:flex;gap:3px;padding:10px 16px 0;background:var(--bg);position:sticky;top:57px;z-index:99;border-bottom:0.5px solid var(--border)}
.tab-btn{flex:1;text-align:center;font-size:11px;font-weight:600;padding:8px 2px;border-bottom:2px solid transparent;color:var(--muted);letter-spacing:0.03em;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;transition:color 0.15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-content{display:none;padding:14px 16px 0}
.tab-content.active{display:block}
.alert{border-radius:10px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.alert.red{background:var(--red-bg);border:0.5px solid rgba(255,77,77,0.3)}
.alert.amber{background:var(--amber-bg);border:0.5px solid rgba(245,158,11,0.3)}
.alert.blue{background:var(--blue-bg);border:0.5px solid rgba(96,165,250,0.3)}
.alert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.alert.red .alert-dot{background:var(--red)}
.alert.amber .alert-dot{background:var(--amber)}
.alert.blue .alert-dot{background:var(--blue)}
.alert-text{font-size:12px;line-height:1.5}
.alert.red .alert-text{color:#fca5a5}
.alert.amber .alert-text{color:#fcd34d}
.alert.blue .alert-text{color:#93c5fd}
.sec-label{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:0.02em}
.badge-ok{background:var(--green-bg);color:var(--green)}
.badge-aog{background:var(--red-bg);color:var(--red)}
.badge-us{background:var(--amber-bg);color:var(--amber)}
.badge-mx{background:var(--blue-bg);color:var(--blue)}
.badge-vip{background:var(--purple-bg);color:var(--purple);font-size:9px}
.badge-transfer{background:rgba(251,191,36,0.15);color:#fbbf24;font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px}
.ac-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.ac-card.conflict{border-color:rgba(255,77,77,0.4)}
.ac-header{padding:11px 13px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border)}
.ac-reg{font-size:14px;font-weight:600;letter-spacing:0.03em;flex:1}
.ac-detail-row{padding:7px 13px;font-size:11px;color:var(--muted);border-bottom:0.5px solid var(--border)}
.flight-row{display:flex;align-items:center;padding:7px 13px;gap:8px;border-bottom:0.5px solid rgba(255,255,255,0.04)}
.flight-row:last-child{border-bottom:none}
.fl-time{font-size:12px;font-weight:500;min-width:80px;font-variant-numeric:tabular-nums}
.fl-route{font-size:12px;color:var(--muted);flex:1}
.fl-pax{font-size:11px;color:var(--muted)}
.no-flights{padding:10px 13px;font-size:12px;color:var(--muted);font-style:italic}
.fuel-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.fuel-card{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px}
.fuel-b-label{font-size:9px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:3px}
.fuel-b-val{font-size:15px;font-weight:600}
.fuel-b-max{font-size:10px;color:var(--muted);margin-top:1px}
.fuel-bar-track{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:6px}
.fuel-bar-fill{height:3px;border-radius:2px}
.fuel-total-card{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.fuel-total-label{font-size:11px;color:var(--muted)}
.fuel-total-val{font-size:14px;font-weight:600}
.staff-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.staff-card.flagged{border-color:rgba(255,77,77,0.4)}
.staff-card.warned{border-color:rgba(245,158,11,0.35)}
.sc-header{padding:11px 13px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid var(--border)}
.sc-name{font-size:13px;font-weight:600;flex:1}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.pill-on{background:var(--green-bg);color:var(--green)}
.pill-rdo{background:var(--blue-bg);color:var(--blue)}
.pill-al{background:var(--purple-bg);color:var(--purple)}
.pill-sick{background:var(--red-bg);color:var(--red)}
.sc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:0.5px solid var(--border)}
.stat{padding:8px 12px;border-right:0.5px solid var(--border)}
.stat:last-child{border-right:none}
.stat-label{font-size:9px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:3px}
.stat-val{font-size:14px;font-weight:600}
.stat-val.red{color:var(--red)}
.stat-val.amber{color:var(--amber)}
.stat-val.green{color:var(--green)}
.sc-row{padding:7px 13px;font-size:11px;color:var(--muted);border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sc-row span{color:var(--text)}
.week-strip{padding:8px 13px;border-bottom:0.5px solid var(--border)}
.strip-label{font-size:9px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px}
.strip-days{display:flex;gap:3px}
.day-pip{flex:1;text-align:center}
.day-pip .dn{font-size:9px;color:var(--muted);margin-bottom:3px}
.day-pip .ds{width:100%;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 1px;min-height:22px}
.ds-b{background:var(--green-bg);border:0.5px solid rgba(52,211,153,0.2)}
.ds-rdo{background:var(--blue-bg);border:0.5px solid rgba(96,165,250,0.15)}
.ds-al{background:var(--purple-bg);border:0.5px solid rgba(167,139,250,0.15)}
.ds-off{background:rgba(255,255,255,0.03);border:0.5px solid var(--border)}
.ds-txt{font-size:9px;font-weight:600}
.ds-b .ds-txt{color:var(--green)}
.ds-rdo .ds-txt{color:var(--blue)}
.ds-al .ds-txt{color:var(--purple)}
.ds-time{font-size:8px;font-weight:600;color:var(--green);line-height:1.2}
.flag-bar{padding:7px 13px;font-size:11px;display:flex;align-items:center;gap:6px}
.flag-bar.red{background:var(--red-bg);border-top:0.5px solid rgba(255,77,77,0.3);color:#fca5a5}
.flag-bar.amber{background:var(--amber-bg);border-top:0.5px solid rgba(245,158,11,0.3);color:#fcd34d}
.flag-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.flag-bar.red .flag-dot{background:var(--red)}
.flag-bar.amber .flag-dot{background:var(--amber)}
.day-scroll{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.day-scroll::-webkit-scrollbar{display:none}
.plan-sticky-header{position:sticky;top:97px;background:var(--bg);z-index:80;padding:8px 0 6px;margin:0 0 8px;border-bottom:0.5px solid var(--border)}
.day-chip{flex-shrink:0;padding:6px 10px;border-radius:8px;background:var(--surface);border:0.5px solid var(--border);text-align:center;cursor:pointer;min-width:44px}
.day-chip.today{background:var(--surface2);border-color:rgba(96,165,250,0.4)}
.day-chip.past{opacity:0.5}
.day-chip .dc-d{font-size:9px;color:var(--muted);margin-bottom:2px}
.day-chip .dc-n{font-size:13px;font-weight:600}
.day-chip.today .dc-n{color:var(--blue)}
.plan-date-header{font-size:14px;font-weight:600;margin:8px 0 0}
.ac-plan-block{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden}
.ac-plan-header{padding:9px 12px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid var(--border)}
.ac-plan-reg{font-size:12px;font-weight:700;letter-spacing:0.04em}
.ac-plan-crew{font-size:11px;color:var(--muted);flex:1}
.fl-line{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:0.5px solid rgba(255,255,255,0.04);font-size:12px}
.fl-line:last-child{border-bottom:none}
.fl-line .fl-t{font-weight:500;min-width:80px;font-variant-numeric:tabular-nums}
.fl-line .fl-r{color:var(--muted)}
.checklist{display:flex;flex-direction:column;gap:4px}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;cursor:pointer}
.check-box{width:16px;height:16px;border-radius:4px;border:0.5px solid rgba(255,255,255,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.check-box.checked{background:var(--green);border-color:var(--green)}
.check-box.checked::after{content:'';width:8px;height:5px;border-left:1.5px solid #0f1117;border-bottom:1.5px solid #0f1117;transform:rotate(-45deg) translateY(-1px);display:block}
.check-text{font-size:12px;flex:1}
.check-item.done .check-text{text-decoration:line-through;opacity:0.4}
.priority-item{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;margin-bottom:4px;line-height:1.5}
.priority-item .pi-sub{font-size:11px;color:var(--muted);margin-top:3px}
.ongoing-item{background:var(--surface);border-left:2px solid var(--amber);border-radius:0 8px 8px 0;padding:8px 12px;font-size:12px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.ongoing-age{font-size:10px;color:var(--amber)}
.shop-item{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--muted);margin-bottom:4px}
.add-btn{width:100%;background:rgba(255,255,255,0.03);border:0.5px dashed rgba(255,255,255,0.12);border-radius:8px;padding:9px;font-size:12px;color:var(--muted);text-align:center;cursor:pointer;margin-top:4px;display:block}
.eod-area{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--muted);min-height:60px;font-style:italic}
.staff-move-card{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:4px}
.sm-time{font-size:11px;font-weight:600;color:var(--blue);margin-bottom:3px}
.sm-names{font-size:12px;line-height:1.6}

/* START TIME PLANNER */
.stp-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px}
.stp-header-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer}
.stp-header-bar:active{background:rgba(255,255,255,0.03)}
.stp-header-left{display:flex;flex-direction:column;gap:2px}
.stp-header-title{font-size:13px;font-weight:600;color:var(--text)}
.stp-header-meta{font-size:11px;color:var(--muted)}
.stp-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer;margin-bottom:6px}
.stp-toggle-label{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.stp-toggle-btn{font-size:11px;color:var(--blue);padding:3px 10px;background:var(--blue-bg);border-radius:20px;border:0.5px solid rgba(96,165,250,0.2);flex-shrink:0}
.stp-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.stp-row{display:flex;align-items:center;background:var(--surface);border:none;border-top:0.5px solid var(--border);padding:10px 14px;cursor:pointer}
.stp-name{flex:1;font-size:13px}
.stp-time{font-size:13px;font-weight:600;color:var(--green);background:rgba(52,211,153,0.1);padding:4px 10px;border-radius:6px;font-variant-numeric:tabular-nums}
.stp-time.unset{color:var(--muted);background:rgba(255,255,255,0.05)}
.draft-box{background:var(--surface);border-top:0.5px solid var(--border);padding:12px 14px}
.draft-label{font-size:9px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.draft-content{font-size:12px;color:var(--text);font-family:monospace;line-height:1.8;margin-bottom:10px;white-space:pre-wrap;outline:none;min-height:40px}
.copy-btn{width:100%;background:var(--green-bg);border:0.5px solid rgba(52,211,153,0.3);border-radius:8px;padding:10px;font-size:13px;font-weight:600;color:var(--green);cursor:pointer;letter-spacing:0.02em}

/* TIME PICKER */
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.picker-sheet{background:#1a1d27;border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:480px}
.picker-title{font-size:13px;font-weight:600;text-align:center;margin-bottom:14px;color:var(--muted)}
.picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.picker-opt{background:var(--surface2);border:0.5px solid var(--border);border-radius:10px;padding:12px 4px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;font-variant-numeric:tabular-nums}
.picker-opt.selected{background:var(--green-bg);border-color:rgba(52,211,153,0.4);color:var(--green)}
.picker-cancel{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:10px;padding:12px;font-size:13px;color:var(--muted);cursor:pointer}

/* AIRCRAFT TAB */
.ac-tab-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer}
.ac-tab-card.conflict{border-color:rgba(255,77,77,0.4)}
.ac-tab-header{padding:12px 14px;display:flex;align-items:center;gap:10px}
.ac-tab-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ac-tab-info{flex:1}
.ac-tab-reg{font-size:15px;font-weight:700;letter-spacing:0.03em}
.ac-tab-times{font-size:12px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
.ac-tab-times span{color:var(--text)}
.month-view{background:var(--bg);position:fixed;inset:0;z-index:150;overflow-y:auto;max-width:480px;margin:0 auto}
.month-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--bg)}
.month-back{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
.month-title{font-size:15px;font-weight:600;flex:1}
.month-list{padding:12px 16px}
.month-row{display:flex;align-items:center;padding:10px 12px;border-radius:8px;margin-bottom:3px;gap:12px}
.month-row.today-row{border:0.5px solid rgba(96,165,250,0.4);background:rgba(96,165,250,0.05)}
.month-row.has-conflict{background:var(--red-bg)}
.mr-date{font-size:12px;font-weight:500;min-width:52px;color:var(--muted)}
.mr-date.today-date{color:var(--blue);font-weight:700}
.mr-content{flex:1;font-size:12px;font-variant-numeric:tabular-nums}
.mr-mx{color:var(--amber)}
.mr-conflict{color:var(--red);font-size:11px}
.mr-dash{color:rgba(255,255,255,0.15)}
.reminder-item{background:var(--blue-bg);border:0.5px solid rgba(96,165,250,0.2);border-radius:10px;padding:10px 12px;font-size:12px;color:#93c5fd;margin-bottom:6px;line-height:1.5}
.conflict-flag{font-size:10px;background:var(--red-bg);color:var(--red);padding:2px 7px;border-radius:20px;border:0.5px solid rgba(255,77,77,0.3)}
.ac-card.warned{border-color:rgba(245,158,11,0.35)}

/* CHAT BAR */
.chat-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);padding:10px 16px 16px;max-width:480px;margin:0 auto;z-index:90}
.chat-row{display:flex;gap:8px;align-items:center}
.chat-input{flex:1;background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:10px 16px;font-size:13px;color:var(--text);outline:none}
.chat-input::placeholder{color:var(--muted)}
.chat-input:focus{border-color:rgba(96,165,250,0.4)}
.chat-send{background:var(--blue);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.chat-mic{background:var(--surface);border:0.5px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--muted)}
.chat-mic.listening{background:var(--red-bg);border-color:rgba(255,77,77,0.5);color:var(--red)}
.mic-hint{font-size:10px;color:var(--muted);text-align:center;margin-bottom:4px;height:14px;transition:opacity 0.2s}

.loading{display:flex;align-items:center;justify-content:center;padding:60px 0;color:var(--muted);font-size:13px}
.dot-pulse{display:inline-flex;gap:4px;margin-left:8px}
.dot-pulse span{width:4px;height:4px;background:var(--muted);border-radius:50%;animation:pulse 1.2s ease-in-out infinite}
.dot-pulse span:nth-child(2){animation-delay:0.2s}
.dot-pulse span:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.status-bar{font-size:10px;color:var(--muted);padding:10px 0 4px;text-align:center}
</style>
</head>
<body>
<div class="app">
  <div class="topbar" style="align-items:flex-start">
    <div>
      <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase">SuperAssist MX</div>
      <div id="today-date" style="font-size:22px;font-weight:700;color:var(--text);line-height:1.2;margin-top:2px">Loading...</div>
      <div id="today-day" style="font-size:12px;color:var(--muted);margin-top:1px"></div>
    </div>
    <div class="topbar-right" id="sun-info" style="padding-top:4px">&#9728; 06:24 &nbsp;&#9790; 18:02</div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab-btn" onclick="switchTab('dailyplan')">Daily plan</button>
    <button class="tab-btn" onclick="switchTab('staff')">Staff</button>
    <button class="tab-btn" onclick="switchTab('aircraft')">Aircraft</button>
  </div>
  <div id="tab-dashboard" class="tab-content active"><div class="loading">Loading<div class="dot-pulse"><span></span><span></span><span></span></div></div></div>
  <div id="tab-dailyplan" class="tab-content"><div class="loading">Loading<div class="dot-pulse"><span></span><span></span><span></span></div></div></div>
  <div id="tab-staff" class="tab-content"><div class="loading">Loading<div class="dot-pulse"><span></span><span></span><span></span></div></div></div>
  <div id="tab-aircraft" class="tab-content"><div class="loading">Loading<div class="dot-pulse"><span></span><span></span><span></span></div></div></div>
</div>

<div class="picker-overlay" id="picker-overlay" style="display:none">
  <div class="picker-sheet">
    <div class="picker-title" id="picker-title">Select start time</div>
    <div class="picker-grid" id="picker-grid"></div>
    <div style="display:flex;gap:8px;margin-top:4px">

<script>
const SUPABASE_URL = 'https://yxwmieurufwxzjlbklcp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LHg8Z4VlZ7z3O6owAtc4yw_L561b2HH';

const db = createClient(SUPABASE_URL, SUPABASE_KEY);
const GCAL_API_KEY = 'AIzaSyDS9mmbwaaHwmEkdswXDO2e0S51rywdcrU';

const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_S=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

const BOWSER_MAX={1:3000,2:7000,3:10000,4:1400};

let appData={aircraft:[],flights:[],staff:[],dueItems:[],fuel:[],reminders:[]};
let currentPlanDate=new Date();
let stpExpanded=false;
let recognition=null;

function todayISO(){
  // Use Fiji local date (UTC+12) to avoid timezone mismatch with Supabase
  const now = new Date();
  const fiji = new Date(now.getTime() + (12 * 60 * 60 * 1000));
  return fiji.toISOString().split('T')[0];
}
function dateISO(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function fmtDate(d){return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`}
function fmtShort(d){return `${DAYS_S[d.getDay()]} ${d.getDate()} ${MONTHS_S[d.getMonth()]}`}

const _now=new Date();
const _dateEl=document.getElementById('today-date');
const _dayEl=document.getElementById('today-day');
if(_dateEl) _dateEl.textContent=_now.getDate()+' '+MONTHS[_now.getMonth()]+' '+_now.getFullYear();
if(_dayEl) _dayEl.textContent=DAYS[_now.getDay()];

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['dashboard','dailyplan','staff','aircraft'][i]===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

async function loadAll(){
  const today=todayISO();
  const [ac,fl,st,di,fu,rm]=await Promise.all([
    db.from('aircraft').select('*').order('registration'),
    db.from('flights').select('*').order('flight_date').order('departure_time'),
    db.from('staff').select('*').order('shift_date').order('shift_start'),
    db.from('due_items').select('*').order('urgency').order('hours_remaining'),
    db.from('fuel').select('*').order('recorded_at',{ascending:false}).limit(8),
    db.from('reminders').select('*').eq('is_active',true).order('created_at',{ascending:false})
  ]);
  appData={aircraft:ac.data||[],flights:fl.data||[],staff:st.data||[],dueItems:di.data||[],fuel:fu.data||[],reminders:rm.data||[]};

  // Preload all daily plan data for the visible 15-day window in ONE query each
  const now=new Date();
  const startISO=dateISO(addDays(now,-7));
  const endISO=dateISO(addDays(now,7));
  const [allPlans, allItems]=await Promise.all([
    db.from('daily_plan').select('*').gte('plan_date',startISO).lte('plan_date',endISO),
    db.from('plan_items').select('*').gte('plan_date',startISO).lte('plan_date',endISO).order('sort_order')
  ]);
  // Build cache keyed by date
  planCache={};
  (allPlans.data||[]).forEach(p=>{
    if(!planCache[p.plan_date])planCache[p.plan_date]={eod_notes:'',items:[]};
    planCache[p.plan_date].eod_notes=p.eod_notes||'';
  });
  (allItems.data||[]).forEach(it=>{
    if(!planCache[it.plan_date])planCache[it.plan_date]={eod_notes:'',items:[]};
    planCache[it.plan_date].items.push(it);
  });

  // Load MX calendar from Google Calendar (runs in parallel with renders)
  await loadMXCalendar();
  renderDashboard();
  renderDailyPlan(currentPlanDate);
  renderStaff();
  renderAircraft();
}

function detectConflict(reg,date){
  const iso=dateISO(date);
  const hasFlights=appData.flights.some(f=>f.aircraft_registration===reg&&f.flight_date===iso);
  const ac=appData.aircraft.find(a=>a.registration===reg);
  if(!ac||!hasFlights)return null;
  if(ac.status==='aog')return{type:'hard',msg:`${reg} is AOG but has flights scheduled`};
  if(ac.status==='mx')return{type:'hard',msg:`${reg} is in MX but has flights scheduled`};
  return null;
}

function getAllConflicts(){
  const out=[];
  const today=new Date();
  const AC_ORDER=['DQ-OMO','DQ-KPI','DQ-ISL'];
  const orderedAC=[...appData.aircraft].sort((a,b)=>AC_ORDER.indexOf(a.registration)-AC_ORDER.indexOf(b.registration));
  orderedAC.forEach(ac=>{
    for(let i=0;i<7;i++){
      const d=addDays(today,i);
      const c=detectConflict(ac.registration,d);
      if(c)out.push({...c,date:fmtShort(d)});
    }
  });
  return out;
}

function selectDay(iso){
  const [y,m,d] = iso.split('-').map(Number);
  renderDailyPlan(new Date(y, m-1, d));
}

function transferBadge(type){
  if(!type) return '';
  return `<span class="badge-transfer">${type}</span>`;
}

function statusBadge(status){
  const map={aog:'badge-aog',['u/s']:'badge-us',mx:'badge-mx',serviceable:'badge-ok'};
  const label={aog:'AOG',['u/s']:'U/S',mx:'In MX',serviceable:'Serviceable'};
  return`<span class="badge ${map[status]||'badge-ok'}">${label[status]||'Serviceable'}</span>`;
}

// DASHBOARD
function renderDashboard(){
  const today=todayISO();
  const todayFlights=appData.flights.filter(f=>f.flight_date===today);
  const latestFuel={};
  appData.fuel.forEach(f=>{if(!latestFuel[f.bowser_number])latestFuel[f.bowser_number]=f});
  const todayStaff=sortByRole(appData.staff.filter(s=>s.shift_date===today));
  const onShift=todayStaff.filter(s=>s.status==='on_shift');
  const offShift=todayStaff.filter(s=>s.status!=='on_shift');

  // Aircraft order: OMO, KPI, ISL
  const AC_ORDER=['DQ-OMO','DQ-KPI','DQ-ISL'];
  const orderedAC=[...appData.aircraft].sort((a,b)=>AC_ORDER.indexOf(a.registration)-AC_ORDER.indexOf(b.registration));

  let html='<div class="sec-label" style="margin-top:4px">Aircraft</div>';
  orderedAC.forEach(ac=>{
    const acF=todayFlights.filter(f=>f.aircraft_registration===ac.registration);
    const conflict=detectConflict(ac.registration,new Date());
    const mxNote=getMXNote(ac.registration,today);
    const urgent=appData.dueItems.filter(d=>d.aircraft_registration===ac.registration&&(d.urgency==='red'||d.urgency==='amber'));
    const shortReg=ac.registration.split('-')[1];
    const iconBg=shortReg==='KPI'?'rgba(245,158,11,0.2)':shortReg==='OMO'?'rgba(52,211,153,0.15)':'rgba(255,77,77,0.15)';
    const iconColor=shortReg==='KPI'?'var(--amber)':shortReg==='OMO'?'var(--green)':'var(--red)';
    // Sector summary line
    const times=acF.map(f=>{const dep=f.route&&f.route.startsWith('NAN');return(dep?'🛫':'🛬')+' '+(dep?(f.departure_time||''):(f.arrival_time||''))}).join(' · ');
    const sectors=acF.length>0?` · ${acF.length}s`:'';
    const subLine=acF.length>0?times+sectors:ac.status==='aog'?'Grounded — awaiting spares':ac.status==='mx'?'MX day — no flights':'No flights today';
    const hasAlert=conflict||urgent.length>0||ac.status==='aog';
    const hasWarn=mxNote&&!hasAlert;
    html+=`<div class="ac-card${hasAlert?' conflict':hasWarn?' warned':''}">
      <div class="ac-header" style="gap:10px">
        <div style="width:36px;height:36px;border-radius:9px;background:${iconBg};color:${iconColor};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${shortReg}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;letter-spacing:0.03em">${ac.registration}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${subLine}</div>
        </div>
        ${statusBadge(ac.status)}
      </div>`;
    if(mxNote)html+=`<div style="padding:6px 13px;font-size:11px;color:var(--amber);border-top:0.5px solid rgba(245,158,11,0.15);background:rgba(245,158,11,0.05)">🔧 ${mxNote}</div>`;
    if(conflict)html+=`<div style="padding:6px 13px;font-size:11px;color:var(--red);border-top:0.5px solid rgba(255,77,77,0.2);background:rgba(255,77,77,0.05)">⚠️ Schedule conflict — ${conflict.msg}</div>`;
    urgent.forEach(item=>{
      const rem=item.hours_remaining!=null?` — ${item.hours_remaining} hrs remaining`:item.days_remaining!=null?` — ${item.days_remaining} days`:'';
      const cls=item.urgency==='red'?'rgba(255,77,77,0.05)':'rgba(245,158,11,0.05)';
      const tc=item.urgency==='red'?'var(--red)':'var(--amber)';
      const bc=item.urgency==='red'?'rgba(255,77,77,0.2)':'rgba(245,158,11,0.2)';
      html+=`<div style="padding:6px 13px;font-size:11px;color:${tc};border-top:0.5px solid ${bc};background:${cls}">⚠ ${item.task_name}${rem}</div>`;
    });
    html+='</div>';
  });

  // Staff snapshot
  if(todayStaff.length>0){
    html+=`<div class="sec-label">Staff — ${onShift.length} on · ${offShift.length} off</div>`;
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">';
    todayStaff.forEach(s=>{
      const isOn=s.status==='on_shift';
      const sub=isOn?(s.shift_start||'—'):(s.status==='rdo'?'RDO':s.status==='al'?'A/L':s.status==='sick'?'Sick':'Off');
      const subColor=isOn?'var(--green)':'#fbbf24';
      html+=`<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:7px 10px">
        <div style="font-size:12px;font-weight:500">${s.name}</div>
        <div style="font-size:11px;color:${subColor};margin-top:1px">${sub}</div>
      </div>`;
    });
    html+='</div>';
  }

  // Fuel
  const fuelEntries=Object.values(latestFuel);
  if(fuelEntries.length>0){
    html+='<div class="sec-label">Fuel</div><div style="display:flex;gap:5px">';
    fuelEntries.forEach(f=>{
      const max=BOWSER_MAX[f.bowser_number]||5000;
      const pct=Math.min(100,Math.round((f.level_litres/max)*100));
      const fc=pct>60?'var(--green)':pct>30?'var(--amber)':'var(--red)';
      html+=`<div style="flex:1;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em">B${f.bowser_number}</div>
        <div style="font-size:13px;font-weight:600;margin-top:2px">${Number(f.level_litres).toLocaleString()}</div>
        <div style="height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:5px"><div style="height:3px;width:${pct}%;background:${fc};border-radius:2px"></div></div>
      </div>`;
    });
    html+='</div>';
  }

  // Reminders
  html+='<div class="sec-label">Reminders</div>';

  else appData.reminders.forEach(r=>{html+=`<div class="reminder-item">${r.content}</div>`});

  document.getElementById('tab-dashboard').innerHTML=html;
}

// DAILY PLAN — with full Supabase persistence
let planCache={};

async function loadPlanData(iso){
  if(planCache[iso]) return planCache[iso];
  const [plan, items] = await Promise.all([
    db.from('daily_plan').select('*').eq('plan_date', iso).maybeSingle(),
    db.from('plan_items').select('*').eq('plan_date', iso).order('sort_order')
  ]);
  planCache[iso] = { eod_notes: plan.data?.eod_notes || '', items: items.data || [] };
  return planCache[iso];
}

async function refreshDayCache(iso){
  const [plan, items]=await Promise.all([
    db.from('daily_plan').select('*').eq('plan_date',iso).maybeSingle(),
    db.from('plan_items').select('*').eq('plan_date',iso).order('sort_order')
  ]);
  planCache[iso]={eod_notes:plan.data?.eod_notes||'',items:items.data||[]};
}

async function savePlanItem(iso, type, content, isComplete=false, sortOrder=0){
  await db.from('plan_items').insert({plan_date:iso,item_type:type,content,is_complete:isComplete,sort_order:sortOrder});
  await refreshDayCache(iso);
}

async function togglePlanItem(id, isComplete, iso){
  await db.from('plan_items').update({is_complete:isComplete}).eq('id',id);
  await refreshDayCache(iso);
  const scrollPos=document.getElementById('tab-dailyplan').scrollTop;
  await renderDailyPlan(currentPlanDate);
  setTimeout(()=>{document.getElementById('tab-dailyplan').scrollTop=scrollPos;},150);
}

async function deletePlanItem(id, iso){
  await db.from('plan_items').delete().eq('id',id);
  await refreshDayCache(iso);
  const scrollPos=document.getElementById('tab-dailyplan').scrollTop;
  await renderDailyPlan(currentPlanDate);
  setTimeout(()=>{document.getElementById('tab-dailyplan').scrollTop=scrollPos;},150);
}

async function saveEODNotes(iso, notes){
  await db.from('daily_plan').upsert({plan_date:iso,eod_notes:notes,updated_at:new Date().toISOString()},{onConflict:'plan_date'});
  if(planCache[iso]) planCache[iso].eod_notes=notes;
}

async function renderDailyPlan(date){
  currentPlanDate=date;
  const today=new Date();
  const iso=dateISO(date);
  // Use preloaded cache — instant. Only fetch if this date isn't cached at all.
  let planData = planCache[iso];
  if(!planData){
    planData = await loadPlanData(iso);
  }
  const todayFlights=appData.flights.filter(f=>f.flight_date===iso);
  const todayStaff=appData.staff.filter(s=>s.shift_date===iso);
  const conflicts=appData.aircraft.map(ac=>detectConflict(ac.registration,date)).filter(Boolean);
  const facilities=planData.items.filter(i=>i.item_type==='facility');
  const priorities=planData.items.filter(i=>i.item_type==='priority');
  const defaultFacilities=['FOD walk','Fuel bowser full at end of day','Empty waste fuel','End of day hangar clean','Daily inspection KPI','Daily inspection OMO','UTE inspection','Tug inspection','Tool control'];

  let html='<div class="plan-sticky-header"><div class="day-scroll" id="plan-day-scroll">';
  for(let i=-7;i<=7;i++){
    const d=addDays(today,i);
    const diso=dateISO(d);
    const isToday=i===0, isPast=i<0, isSel=diso===iso;
    html+=`<div class="day-chip${isToday?' today':''}${isPast?' past':''}" style="${isSel&&!isToday?'border-color:rgba(255,255,255,0.3)':''}" onclick="selectDay('${diso}')"><div class="dc-d">${DAYS_S[d.getDay()]}</div><div class="dc-n">${d.getDate()}</div></div>`;
  }
  html+='</div>';
  html+=`<div class="plan-date-header">${fmtDate(date)}</div></div>`;
  conflicts.forEach(c=>{html+=`<div class="alert red"><div class="alert-dot"></div><div class="alert-text"><strong>Schedule conflict</strong> — ${c.msg}</div></div>`});

  html+='<div class="sec-label">Aircraft</div>';
  const AC_ORDER=['DQ-OMO','DQ-KPI','DQ-ISL'];
  const orderedAC=[...appData.aircraft].sort((a,b)=>AC_ORDER.indexOf(a.registration)-AC_ORDER.indexOf(b.registration));
  orderedAC.forEach(ac=>{
    const acF=todayFlights.filter(f=>f.aircraft_registration===ac.registration);
    const crewFlight=acF.find(f=>f.crew);
    const crewDisplay=crewFlight&&crewFlight.crew?`🧑‍✈️ ${crewFlight.crew}`:'';
    const mxNote=getMXNote(ac.registration,iso);
    html+=`<div class="ac-plan-block"><div class="ac-plan-header"><span class="ac-plan-reg">${ac.registration}</span><span class="ac-plan-crew">${crewDisplay}</span>${statusBadge(ac.status)}</div>`;
    if(mxNote)html+=`<div style="padding:6px 12px;font-size:11px;color:var(--amber);border-bottom:0.5px solid var(--border)">🔧 ${mxNote}</div>`;
    if(acF.length>0){acF.forEach(f=>{const isDep=f.route&&f.route.startsWith('NAN');const emoji=isDep?'🛫':'🛬';const displayTime=isDep?(f.departure_time||''):(f.arrival_time||'');html+=`<div class="fl-line"><span class="fl-t">${emoji} ${displayTime}</span><span class="fl-r">${f.route||''}</span>${f.is_vip?'<span class="badge badge-vip">VIP</span>':''}${transferBadge(f.transfer_type)}${f.pax_count>0?`<span style="font-size:11px;color:var(--muted)">${f.pax_count} pax</span>`:''}</div>`})}
    else{html+=`<div class="fl-line" style="color:var(--muted);font-style:italic">${ac.status==='aog'?'Grounded — no flights':ac.status==='mx'?'MX day — no flights':'No flights scheduled'}</div>`}
    html+='</div>';
  });

  if(todayStaff.length>0){
    html+='<div class="sec-label">Staff movements</div>';
    const groups={};
    sortByRole(todayStaff).forEach(s=>{const k=s.shift_start||'Off shift';if(!groups[k])groups[k]=[];groups[k].push(s.name.split(' ')[0])});
    Object.keys(groups).sort().forEach(t=>{html+=`<div class="staff-move-card"><div class="sm-time">${t}</div><div class="sm-names">${groups[t].join(', ')}</div></div>`});
  }

  html+=`<div id="stp-container">${renderSTP(date)}</div>`;

  // Facilities — fixed standard checklist, always fully visible, tick state persists per day
  html+='<div class="sec-label">Facilities</div><div class="checklist">';
  // Build a lookup of which facility items are marked complete for this day
  const facilityState={};
  facilities.forEach(f=>{facilityState[f.content]={id:f.id,complete:f.is_complete}});
  defaultFacilities.forEach((item,i)=>{
    const state=facilityState[item];
    const isComplete=state?state.complete:false;
    html+=`<div class="check-item${isComplete?' done':''}" data-iso="${iso}" data-complete="${!isComplete}" onclick="handleFacilityTap(this)"><div class="check-box${isComplete?' checked':''}"></div><span class="check-text">${item}</span></div>`;
  });
  html+='</div>';

  html+=`<div class="sec-label">My priorities</div><div>`;
  priorities.forEach(item=>{html+=`<div class="priority-item" style="display:flex;justify-content:space-between">${item.content}<span onclick="deletePlanItem('${item.id}','${iso}')" style="font-size:18px;color:var(--muted);opacity:0.4;cursor:pointer;flex-shrink:0;margin-left:8px">×</span></div>`});
  html+=`<button class="add-btn" onclick="promptAddItem('priority','${iso}')">+ Add priority</button></div>`;


  html+='<div class="sec-label">End of day notes</div>';
  const eodSafe=(planData.eod_notes||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  html+=`<div class="eod-area" contenteditable="true" id="eod-notes" onblur="saveEODNotes('${iso}',this.innerText.trim())">${eodSafe||'Tap to add end of day notes...'}</div>`;

  document.getElementById('tab-dailyplan').innerHTML=html;
  setTimeout(()=>{
    const s=document.getElementById('plan-day-scroll');
    if(s){
      const chips=Array.from(s.children);
      const target=chips.find(c=>c.getAttribute&&c.onclick&&c.onclick.toString().includes(iso)) || chips[7];
      if(target) target.scrollIntoView({inline:'center',behavior:'smooth'});
    }
  },100);
}

async function promptAddItem(type, iso){
  const labels={facility:'facility item',priority:'priority',ongoing:'ongoing item',shopping:'shopping list item'};
  const item=prompt('Add '+(labels[type]||type)+':');
  if(!item||!item.trim()) return;
  const {data:existing}=await db.from('plan_items').select('id').eq('plan_date',iso).eq('item_type',type);
  await savePlanItem(iso,type,item.trim(),false,(existing||[]).length);
  const scrollPos=document.getElementById('tab-dailyplan').scrollTop;
  await renderDailyPlan(currentPlanDate);
  setTimeout(()=>{document.getElementById('tab-dailyplan').scrollTop=scrollPos;},50);
}

function handleFacilityTap(el){
  const iso=el.getAttribute('data-iso');
  const makeComplete=el.getAttribute('data-complete')==='true';
  const content=el.querySelector('.check-text').textContent;
  // Instant visual update — feels snappy
  el.classList.toggle('done', makeComplete);
  el.querySelector('.check-box').classList.toggle('checked', makeComplete);
  el.setAttribute('data-complete', String(!makeComplete));
  // Save to database in background — no re-render needed
  toggleFacility(content, makeComplete, iso);
}

async function toggleFacility(content, makeComplete, iso){
  const {data:existing}=await db.from('plan_items')
    .select('id')
    .eq('plan_date',iso)
    .eq('item_type','facility')
    .eq('content',content)
    .maybeSingle();
  if(existing){
    await db.from('plan_items').update({is_complete:makeComplete}).eq('id',existing.id);
  } else {
    await db.from('plan_items').insert({plan_date:iso,item_type:'facility',content,is_complete:makeComplete});
  }
  // Update in-memory cache so state stays consistent without a full refetch
  if(planCache[iso]){
    const found=planCache[iso].items.find(i=>i.item_type==='facility'&&i.content===content);
    if(found){
      found.is_complete=makeComplete;
    } else {
      planCache[iso].items.push({plan_date:iso,item_type:'facility',content,is_complete:makeComplete,id:'temp-'+Date.now()});
    }
  }
}


// stpTimes stores per-day overrides: { 'YYYY-MM-DD': { staffId: 'HH:MM', ... } }
const stpTimes={};

function getStpStaff(date){
  const iso=dateISO(date);
  // Use today's staff list as the roster for all days — same people, different times
  const base=appData.staff.filter(s=>s.shift_date===todayISO());
  // If we have actual data for this date, use it; otherwise use today's staff as template
  const dated=appData.staff.filter(s=>s.shift_date===iso);
  const staff=dated.length>0?dated:base;
  // Apply any day-specific time overrides stored in stpTimes
  const overrides=stpTimes[iso]||{};
  return sortByRole(staff.map(s=>({...s,shift_start:overrides[s.id]||s.shift_start,_planDate:iso})));
}

function renderSTP(date){
  const iso=dateISO(date);
  const stpStaff=getStpStaff(date);
  const timedCount=stpStaff.filter(s=>s.shift_start).length;
  const totalOn=stpStaff.filter(s=>s.status==='on_shift'||!s.status).length;

  // Collapsed: show just a header bar with summary
  let html=`<div class="stp-card" id="stp-card">`;
  html+=`<div class="stp-header-bar" onclick="toggleSTP()">
    <div class="stp-header-left">
      <span class="stp-header-title">Start time planner</span>
      <span class="stp-header-meta">${timedCount} of ${totalOn} set · ${fmtShort(date)}</span>
    </div>
    <span class="stp-toggle-btn" id="stp-btn">${stpExpanded?'▲ Close':'▼ Open'}</span>
  </div>`;

  if(!stpExpanded){
    html+='</div>';
    return html;
  }

  if(stpExpanded){
    html+='<div class="stp-list" id="stp-list" style="padding:0 0 4px">';
    const yesterdayISO=dateISO(addDays(new Date(iso),-1));
    stpStaff.forEach(s=>{
      const hasTime=s.shift_start;
      const isOn=s.status==='on_shift'||!s.status;
      const statusLabel=s.status==='rdo'?'RDO':s.status==='al'?'A/L':s.status==='sick'?'SICK':'ON';
      const statusStyle=isOn
        ?'font-size:10px;font-weight:600;color:var(--green);background:rgba(52,211,153,0.12);padding:2px 7px;border-radius:20px;flex-shrink:0'
        :'font-size:10px;font-weight:600;color:#fbbf24;background:rgba(251,191,36,0.12);padding:2px 7px;border-radius:20px;flex-shrink:0';
      // Find yesterday's shift for this person
      const yesterday=appData.staff.find(x=>x.name===s.name&&x.shift_date===yesterdayISO);
      let yesterdayText='';
      if(yesterday){
        if(yesterday.status==='rdo') yesterdayText='Yesterday: RDO';
        else if(yesterday.status==='al') yesterdayText='Yesterday: A/L';
        else if(yesterday.status==='sick') yesterdayText='Yesterday: SICK';
        else if(yesterday.shift_start) yesterdayText=`Yesterday: ${yesterday.shift_start}–${yesterday.shift_end||'?'}`;
        else yesterdayText='Yesterday: ON';
      } else {
        yesterdayText='Yesterday: —';
      }
      const yest=`<span style="font-size:10px;color:var(--muted);flex-shrink:0">${yesterdayText}</span>`;
      html+=`<div class="stp-row" style="flex-wrap:wrap;gap:6px" onclick="openPickerForDay('${s.id}','${s.name}','${s.shift_start||''}','${iso}')">
        <span class="stp-name">${s.name}</span>
        <span style="${statusStyle}">${statusLabel}</span>
        ${yest}
        <span class="stp-time${hasTime?'':' unset'}" style="margin-left:auto">${hasTime||'—'}</span>
      </div>`;
    });
    html+='</div>';
  }

  // Draft — always visible, grouped by time, editable
  const groups={};
  stpStaff.filter(s=>s.shift_start).sort((a,b)=>a.shift_start.localeCompare(b.shift_start)).forEach(s=>{
    const k=s.shift_start;
    if(!groups[k])groups[k]=[];
    groups[k].push(s.name.split(' ')[0]);
  });

  // Format date as DD/MM/YY
  const dd=String(date.getDate()).padStart(2,'0');
  const mm=String(date.getMonth()+1).padStart(2,'0');
  const yy=String(date.getFullYear()).slice(-2);
  const dateLine=`${dd}/${mm}/${yy}`;

  html+='<div class="draft-box" id="stp-draft"><div class="draft-label">Draft message</div><div class="draft-content" id="draft-content">';
  if(Object.keys(groups).length===0){
    html+=`${dateLine}\n\nSet start times above to generate draft`;
  } else {
    html+=`${dateLine}\n`;
    Object.keys(groups).sort().forEach(t=>{html+=`\n${t} ${groups[t].join(', ')}`});
  }
  html+='</div><button class="copy-btn" onclick="copyDraft()">Copy to clipboard</button></div>';
  html+='</div>'; // close stp-card
  return html;
}

function toggleSTP(){
  stpExpanded=!stpExpanded;
  const container=document.getElementById('stp-container');
  if(container){
    container.innerHTML=renderSTP(currentPlanDate);
  } else {
    // Fallback — full re-render if container not found
    const scrollPos=document.getElementById('tab-dailyplan').scrollTop;
    renderDailyPlan(currentPlanDate).then(()=>{
      setTimeout(()=>{document.getElementById('tab-dailyplan').scrollTop=scrollPos;},150);
    });
  }
}

async function clearStaffTime(){
  const {id, iso} = pickerContext;
  if(!id || !iso) { closePicker(); return; }
  if(iso === todayISO()){
    await db.from('staff').update({shift_start: null}).eq('id', id);
    await loadAll();
  } else {
    if(stpTimes[iso]) delete stpTimes[iso][id];
  }
  closePicker();
  const container = document.getElementById('stp-container');
  if(container) container.innerHTML = renderSTP(currentPlanDate);
}

async function selectTimeForDay(id,time,iso){
  if(!stpTimes[iso])stpTimes[iso]={};
  stpTimes[iso][id]=time;
  if(iso===todayISO()){await db.from("staff").update({shift_start:time}).eq("id",id);await loadAll();}
  closePicker();
  const container=document.getElementById('stp-container');
  if(container){
    container.innerHTML=renderSTP(currentPlanDate);
  }
}

function copyDraft(){
  const el=document.getElementById('draft-content');
  if(!el)return;
  const text=el.innerText.trim();
  if(!text||text.includes('Set start times'))return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.copy-btn');
    if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy to clipboard',2000)}
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    const btn=document.querySelector('.copy-btn');
    if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy to clipboard',2000)}
  });
}

const ROLE_ORDER = ['Maintenance Supervisor','DHC6 B1 LAME','DHC6 B2 LAME','AS350B2 B1 LAME','AME','Base Detailer'];
function sortByRole(list){
  return [...list].sort((a,b)=>{
    const ai=ROLE_ORDER.indexOf(a.role), bi=ROLE_ORDER.indexOf(b.role);
    if(ai!==bi)return (ai===-1?99:ai)-(bi===-1?99:bi);
    return (a.shift_start||'').localeCompare(b.shift_start||'');
  });
}

// June 2026 MX calendar — sourced from maintenance calendar PDF
// Live Google Calendar MX data — loaded once at startup
let mxCalendarData = {}; // { 'YYYY-MM-DD': { 'DQ-KPI': 'task', ... } }

async function loadMXCalendar(){
  try {
    const now = new Date();
    // Use local date parts for month boundaries
    const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
    const end = new Date(now.getFullYear(), now.getMonth() + 2, 1).toISOString();
    const url = `https://www.googleapis.com/calendar/v3/calendars/${GCAL_CALENDAR_ID}/events?key=${GCAL_API_KEY}&timeMin=${encodeURIComponent(start)}&timeMax=${encodeURIComponent(end)}&singleEvents=true&orderBy=startTime&maxResults=100&fields=items(id,summary,start,end)`;
    const resp = await fetch(url);
    if(!resp.ok){
      console.warn('MX Calendar API error:', resp.status, await resp.text());
      return;
    }
    const data = await resp.json();
    if(!data.items || data.items.length === 0){
      console.warn('MX Calendar: no items returned');
      return;
    }
    mxCalendarData = {};
    data.items.forEach(event => {
      const title = event.summary || '';
      const regMatch = title.match(/DQ-[A-Z]{3}/);
      if(!regMatch) return;
      const reg = regMatch[0];
      const task = title.replace(/DQ-[A-Z]{3}\s*[—\-–]\s*/, '').trim();
      // Use date field directly — all-day events have start.date not start.dateTime
      const startDate = event.start.date || (event.start.dateTime||'').split('T')[0];
      const endDate = event.end.date || (event.end.dateTime||'').split('T')[0];
      if(!startDate || !endDate) return;
      // Parse manually to avoid UTC shift
      const [sy,sm,sd] = startDate.split('-').map(Number);
      const [ey,em,ed] = endDate.split('-').map(Number);
      const cur = new Date(sy, sm-1, sd);
      const end_ = new Date(ey, em-1, ed);
      while(cur < end_){
        const iso = dateISO(cur);
        if(!mxCalendarData[iso]) mxCalendarData[iso] = {};
        mxCalendarData[iso][reg] = task;
        cur.setDate(cur.getDate() + 1);
      }
    });
    console.log('MX Calendar loaded:', Object.keys(mxCalendarData).length, 'dates');
  } catch(e) {
    console.warn('MX Calendar load failed:', e.message);
  }
}

function getMXNote(reg, diso){
  const day = mxCalendarData[diso];
  return day ? day[reg] || null : null;
}

async function handleChat(msg){
  msg=msg.trim();
  if(!msg)return;
  const lower=msg.toLowerCase();

  // SHIFT SCHEDULE PARSER
  // Handles format: "12.06.26\n0600 Nikil Paula\n0800 James Howard\n1100 Bryan"
  // Also handles: "0600 Nikil Paula\n0800 James" (assumes today/tomorrow)
  const lines=msg.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const timeLinePattern=/^(\d{3,4})\s+(.+)$/;
  const dateLinePattern=/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})$/;
  const hasTimeLines=lines.some(l=>timeLinePattern.test(l));

  if(hasTimeLines){
    // Parse the date if present
    let targetISO=todayISO();
    const dateLine=lines.find(l=>dateLinePattern.test(l));
    if(dateLine){
      const m=dateLine.match(dateLinePattern);
      const day=m[1].padStart(2,'0');
      const month=m[2].padStart(2,'0');
      const year=m[3].length===2?'20'+m[3]:m[3];
      targetISO=`${year}-${month}-${day}`;
    }

    // Build name → time map
    const assignments={};
    lines.forEach(line=>{
      const m=line.match(timeLinePattern);
      if(!m)return;
      const time=m[1].length===3?'0'+m[1]:m[1];
      const formattedTime=time.slice(0,2)+':'+time.slice(2);
      const names=m[2].split(/\s+/).filter(Boolean);
      names.forEach(name=>{assignments[name.toLowerCase()]=formattedTime});
    });

    if(Object.keys(assignments).length===0){
      alert('Could not read shift times. Try format:\n0600 Nikil Paula\n0800 James Howard');
      return;
    }

    // Match names to staff records for this date
    const staffForDay=appData.staff.filter(s=>s.shift_date===targetISO);
    let matched=0;
    for(const s of staffForDay){
      const firstName=s.name.split(' ')[0].toLowerCase();
      if(assignments[firstName]){
        await db.from('staff').update({shift_start:assignments[firstName]}).eq('id',s.id);
        matched++;
      }
    }

    if(matched>0){
      await loadAll();
      // Switch to daily plan for that date
      switchTab('dailyplan');
      await renderDailyPlan(new Date(targetISO+'T00:00:00'));
      showChatFeedback(`✓ Updated ${matched} start times for ${targetISO}`);
    } else {
      alert(`Found time assignments but no matching staff for ${targetISO}. Check the date and names match the roster.`);
    }
    return;
  }

  if(lower.includes('reminder')||lower.includes('remember')){
    const content=msg.replace(/add reminder[:\-]?\s*/i,'').replace(/remember[:\-]?\s*/i,'').replace(/reminder[:\-]?\s*/i,'');
    await db.from('reminders').insert({content,source:'chat'});
    await loadAll();
    showChatFeedback('✓ Reminder added');
    return;
  }
  const regs=['dq-kpi','dq-omo','dq-isl'];
  const reg=regs.find(r=>lower.includes(r));
  if(reg){
    const status=lower.includes('aog')?'aog':lower.includes('u/s')?'u/s':lower.includes(' mx')?'mx':lower.includes('serviceable')?'serviceable':null;
    if(status){
      await db.from('aircraft').update({status,updated_at:new Date().toISOString()}).eq('registration',reg.toUpperCase());
      await loadAll();
      showChatFeedback(`✓ ${reg.toUpperCase()} updated to ${status}`);
      return;
    }
  }
  alert('Try:\n• "DQ-ISL serviceable"\n• "DQ-KPI AOG"\n• "add reminder: your note"\n• Paste shift schedule e.g:\n  12.06.26\n  0600 Nikil Paula\n  0800 James Howard');
}

function showChatFeedback(msg){
  const hint=document.getElementById('mic-hint');
  if(hint){hint.textContent=msg;hint.style.color='var(--green)';setTimeout(()=>{hint.textContent='';hint.style.color='';},3000);}
}

// VOICE — Safari-safe single-shot approach
function toggleMic(){
  const btn=document.getElementById('mic-btn');
  const hint=document.getElementById('mic-hint');
  if(recognition){
    recognition.stop();
    recognition=null;
    btn.classList.remove('listening');
    hint.textContent='';
    return;
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Voice input not supported on this browser. Try Chrome or Safari on iOS 17+.');return}
  try{
    recognition=new SR();
    recognition.lang='en-AU';
    recognition.interimResults=false;
    recognition.maxAlternatives=1;
    recognition.onstart=()=>{btn.classList.add('listening');hint.textContent='Listening... tap mic to stop'};
    recognition.onresult=e=>{
      const t=e.results[0][0].transcript;
      document.getElementById('chat-input').value=t;
      handleChat(t);
      btn.classList.remove('listening');
      hint.textContent='';
      recognition=null;
    };
    recognition.onerror=e=>{
      btn.classList.remove('listening');
      hint.textContent='';
      recognition=null;
      if(e.error!=='aborted')alert('Voice error: '+e.error+'. Try typing instead.');
    };
    recognition.onend=()=>{btn.classList.remove('listening');hint.textContent='';recognition=null};
    recognition.start();
  }catch(e){
    btn.classList.remove('listening');
    hint.textContent='';
    recognition=null;
    alert('Could not start voice input. Try typing instead.');
  }
}

loadAll();
</script>
