<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SuperAssist MX</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:rgba(255,255,255,0.08);--text:#f0f2f8;--muted:#8b90a8;--red:#ff4d4d;--red-bg:rgba(255,77,77,0.12);--amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);--green:#34d399;--green-bg:rgba(52,211,153,0.12);--blue:#60a5fa;--blue-bg:rgba(96,165,250,0.12);--purple:#a78bfa;--purple-bg:rgba(167,139,250,0.12)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;padding-bottom:120px}
.topbar{padding:14px 16px 10px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg);z-index:100}
.topbar h1{font-size:15px;font-weight:600;letter-spacing:0.02em}
.topbar p{font-size:11px;color:var(--muted);margin-top:1px}
.topbar-right{font-size:11px;color:var(--muted);text-align:right}
.tab-bar{display:flex;gap:3px;padding:10px 16px 0;background:var(--bg);position:sticky;top:57px;z-index:99;border-bottom:0.5px solid var(--border)}
.tab-btn{flex:1;text-align:center;font-size:11px;font-weight:600;padding:8px 2px;border-bottom:2px solid transparent;color:var(--muted);letter-spacing:0.03em;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;transition:color 0.15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-content{display:none;padding:14px 16px 0}
.tab-content.active{display:block}
.alert{border-radius:10px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.alert.red{background:var(--red-bg);border:0.5px solid rgba(255,77,77,0.3)}
.alert.amber{background:var(--amber-bg);border:0.5px solid rgba(245,158,11,0.3)}
.alert.blue{background:var(--blue-bg);border:0.5px solid rgba(96,165,250,0.3)}
.alert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.alert.red .alert-dot{background:var(--red)}
.alert.amber .alert-dot{background:var(--amber)}
.alert.blue .alert-dot{background:var(--blue)}
.alert-text{font-size:12px;line-height:1.5}
.alert.red .alert-text{color:#fca5a5}
.alert.amber .alert-text{color:#fcd34d}
.alert.blue .alert-text{color:#93c5fd}
.sec-label{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:0.02em}
.badge-ok{background:var(--green-bg);color:var(--green)}
.badge-aog{background:var(--red-bg);color:var(--red)}
.badge-us{background:var(--amber-bg);color:var(--amber)}
.badge-mx{background:var(--blue-bg);color:var(--blue)}
.badge-vip{background:var(--purple-bg);color:var(--purple);font-size:9px}
.ac-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.ac-card.conflict{border-color:rgba(255,77,77,0.4)}
.ac-header{padding:11px 13px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border)}
.ac-reg{font-size:14px;font-weight:600;letter-spacing:0.03em;flex:1}
.ac-detail-row{padding:7px 13px;font-size:11px;color:var(--muted);border-bottom:0.5px solid var(--border)}
.flight-row{display:flex;align-items:center;padding:7px 13px;gap:8px;border-bottom:0.5px solid rgba(255,255,255,0.04)}
.flight-row:last-child{border-bottom:none}
.fl-time{font-size:12px;font-weight:500;min-width:80px;font-variant-numeric:tabular-nums}
.fl-route{font-size:12px;color:var(--muted);flex:1}
.fl-pax{font-size:11px;color:var(--muted)}
.no-flights{padding:10px 13px;font-size:12px;color:var(--muted);font-style:italic}
.fuel-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.fuel-card{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px}
.fuel-b-label{font-size:9px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:3px}
.fuel-b-val{font-size:15px;font-weight:600}
.fuel-b-max{font-size:10px;color:var(--muted);margin-top:1px}
.fuel-bar-track{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:6px}
.fuel-bar-fill{height:3px;border-radius:2px}
.fuel-total-card{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.fuel-total-label{font-size:11px;color:var(--muted)}
.fuel-total-val{font-size:14px;font-weight:600}
.staff-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.staff-card.flagged{border-color:rgba(255,77,77,0.4)}
.staff-card.warned{border-color:rgba(245,158,11,0.35)}
.sc-header{padding:11px 13px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid var(--border)}
.sc-name{font-size:13px;font-weight:600;flex:1}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.pill-on{background:var(--green-bg);color:var(--green)}
.pill-rdo{background:var(--blue-bg);color:var(--blue)}
.pill-al{background:var(--purple-bg);color:var(--purple)}
.pill-sick{background:var(--red-bg);color:var(--red)}
.sc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:0.5px solid var(--border)}
.stat{padding:8px 12px;border-right:0.5px solid var(--border)}
.stat:last-child{border-right:none}
.stat-label{font-size:9px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:3px}
.stat-val{font-size:14px;font-weight:600}
.stat-val.red{color:var(--red)}
.stat-val.amber{color:var(--amber)}
.stat-val.green{color:var(--green)}
.sc-row{padding:7px 13px;font-size:11px;color:var(--muted);border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sc-row span{color:var(--text)}
.week-strip{padding:8px 13px;border-bottom:0.5px solid var(--border)}
.strip-label{font-size:9px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px}
.strip-days{display:flex;gap:3px}
.day-pip{flex:1;text-align:center}
.day-pip .dn{font-size:9px;color:var(--muted);margin-bottom:3px}
.day-pip .ds{width:100%;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 1px;min-height:22px}
.ds-b{background:var(--green-bg);border:0.5px solid rgba(52,211,153,0.2)}
.ds-rdo{background:var(--blue-bg);border:0.5px solid rgba(96,165,250,0.15)}
.ds-al{background:var(--purple-bg);border:0.5px solid rgba(167,139,250,0.15)}
.ds-off{background:rgba(255,255,255,0.03);border:0.5px solid var(--border)}
.ds-txt{font-size:9px;font-weight:600}
.ds-b .ds-txt{color:var(--green)}
.ds-rdo .ds-txt{color:var(--blue)}
.ds-al .ds-txt{color:var(--purple)}
.ds-time{font-size:8px;font-weight:600;color:var(--green);line-height:1.2}
.flag-bar{padding:7px 13px;font-size:11px;display:flex;align-items:center;gap:6px}
.flag-bar.red{background:var(--red-bg);border-top:0.5px solid rgba(255,77,77,0.3);color:#fca5a5}
.flag-bar.amber{background:var(--amber-bg);border-top:0.5px solid rgba(245,158,11,0.3);color:#fcd34d}
.flag-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.flag-bar.red .flag-dot{background:var(--red)}
.flag-bar.amber .flag-dot{background:var(--amber)}
.day-scroll{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.day-scroll::-webkit-scrollbar{display:none}
.day-chip{flex-shrink:0;padding:6px 10px;border-radius:8px;background:var(--surface);border:0.5px solid var(--border);text-align:center;cursor:pointer;min-width:44px}
.day-chip.today{background:var(--surface2);border-color:rgba(96,165,250,0.4)}
.day-chip.past{opacity:0.5}
.day-chip .dc-d{font-size:9px;color:var(--muted);margin-bottom:2px}
.day-chip .dc-n{font-size:13px;font-weight:600}
.day-chip.today .dc-n{color:var(--blue)}
.plan-date-header{font-size:14px;font-weight:600;margin-bottom:12px}
.ac-plan-block{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden}
.ac-plan-header{padding:9px 12px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid var(--border)}
.ac-plan-reg{font-size:12px;font-weight:700;letter-spacing:0.04em}
.ac-plan-crew{font-size:11px;color:var(--muted);flex:1}
.fl-line{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:0.5px solid rgba(255,255,255,0.04);font-size:12px}
.fl-line:last-child{border-bottom:none}
.fl-line .fl-t{font-weight:500;min-width:80px;font-variant-numeric:tabular-nums}
.fl-line .fl-r{color:var(--muted)}
.checklist{display:flex;flex-direction:column;gap:4px}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;cursor:pointer}
.check-box{width:16px;height:16px;border-radius:4px;border:0.5px solid rgba(255,255,255,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.check-box.checked{background:var(--green);border-color:var(--green)}
.check-box.checked::after{content:'';width:8px;height:5px;border-left:1.5px solid #0f1117;border-bottom:1.5px solid #0f1117;transform:rotate(-45deg) translateY(-1px);display:block}
.check-text{font-size:12px;flex:1}
.check-item.done .check-text{text-decoration:line-through;opacity:0.4}
.priority-item{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;margin-bottom:4px;line-height:1.5}
.priority-item .pi-sub{font-size:11px;color:var(--muted);margin-top:3px}
.ongoing-item{background:var(--surface);border-left:2px solid var(--amber);border-radius:0 8px 8px 0;padding:8px 12px;font-size:12px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.ongoing-age{font-size:10px;color:var(--amber)}
.shop-item{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--muted);margin-bottom:4px}
.add-btn{width:100%;background:rgba(255,255,255,0.03);border:0.5px dashed rgba(255,255,255,0.12);border-radius:8px;padding:9px;font-size:12px;color:var(--muted);text-align:center;cursor:pointer;margin-top:4px;display:block}
.eod-area{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--muted);min-height:60px;font-style:italic}
.staff-move-card{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:4px}
.sm-time{font-size:11px;font-weight:600;color:var(--blue);margin-bottom:3px}
.sm-names{font-size:12px;line-height:1.6}

/* START TIME PLANNER */
.stp-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer;margin-bottom:6px}
.stp-toggle-label{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.stp-toggle-btn{font-size:11px;color:var(--blue);padding:3px 10px;background:var(--blue-bg);border-radius:20px;border:0.5px solid rgba(96,165,250,0.2)}
.stp-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.stp-row{display:flex;align-items:center;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer}
.stp-name{flex:1;font-size:13px}
.stp-time{font-size:13px;font-weight:600;color:var(--green);background:rgba(52,211,153,0.1);padding:4px 10px;border-radius:6px;font-variant-numeric:tabular-nums}
.stp-time.unset{color:var(--muted);background:rgba(255,255,255,0.05)}
.draft-box{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:12px}
.draft-label{font-size:9px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.draft-content{font-size:12px;color:var(--text);font-family:monospace;line-height:1.8;margin-bottom:10px}
.copy-btn{width:100%;background:var(--green-bg);border:0.5px solid rgba(52,211,153,0.3);border-radius:8px;padding:10px;font-size:13px;font-weight:600;color:var(--green);cursor:pointer;letter-spacing:0.02em}

/* TIME PICKER */
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.picker-sheet{background:#1a1d27;border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:480px}
.picker-title{font-size:13px;font-weight:600;text-align:center;margin-bottom:14px;color:var(--muted)}
.picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.picker-opt{background:var(--surface2);border:0.5px solid var(--border);border-radius:10px;padding:12px 4px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;font-variant-numeric:tabular-nums}
.picker-opt.selected{background:var(--green-bg);border-color:rgba(52,211,153,0.4);color:var(--green)}
.picker-cancel{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:10px;padding:12px;font-size:13px;color:var(--muted);cursor:pointer}

/* AIRCRAFT TAB */
.ac-tab-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer}
.ac-tab-card.conflict{border-color:rgba(255,77,77,0.4)}
.ac-tab-header{padding:12px 14px;display:flex;align-items:center;gap:10px}
.ac-tab-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ac-tab-info{flex:1}
.ac-tab-reg{font-size:15px;font-weight:700;letter-spacing:0.03em}
.ac-tab-times{font-size:12px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
.ac-tab-times span{color:var(--text)}
.month-view{background:var(--bg);position:fixed;inset:0;z-index:150;overflow-y:auto;max-width:480px;margin:0 auto}
.month-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--bg)}
.month-back{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
.month-title{font-size:15px;font-weight:600;flex:1}
.month-list{padding:12px 16px}
.month-row{display:flex;align-items:center;padding:10px 12px;border-radius:8px;margin-bottom:3px;gap:12px}
.month-row.today-row{border:0.5px solid rgba(96,165,250,0.4);background:rgba(96,165,250,0.05)}
.month-row.has-conflict{background:var(--red-bg)}
.mr-date{font-size:12px;font-weight:500;min-width:52px;color:var(--muted)}
.mr-date.today-date{color:var(--blue);font-weight:700}
.mr-content{flex:1;font-size:12px;font-variant-numeric:tabular-nums}
.mr-mx{color:var(--amber)}
.mr-conflict{color:var(--red);font-size:11px}
.mr-dash{color:rgba(255,255,255,0.15)}
.reminder-item{background:var(--blue-bg);border:0.5px solid rgba(96,165,250,0.2);border-radius:10px;padding:10px 12px;font-size:12px;color:#93c5fd;margin-bottom:6px;line-height:1.5}
.conflict-flag{font-size:10px;background:var(--red-bg);color:var(--red);padding:2px 7px;border-radius:20px;border:0.5px solid rgba(255,77,77,0.3)}

/* CHAT BAR */
.chat-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);padding:10px 16px 16px;max-width:480px;margin:0 auto;z-index:90}
.chat-row{display:flex;gap:8px;align-items:center}
.chat-input{flex:1;background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:10px 16px;font-size:13px;color:var(--text);outline:none}
.chat-input::placeholder{color:var(--muted)}
.chat-input:focus{border-color:rgba(96,165,250,0.4)}
.chat-send{background:var(--blue);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.chat-mic{background:var(--surface);border:0.5px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--muted)}
.chat-mic.listening{background:var(--red-bg);border-color:rgba(255,77,77,0.5);color:var(--red)}
.mic-hint{font-size:10px;color:var(--muted);text-align:center;margin-bottom:4px;height:14px;transition:opacity 0.2s}

.loading{display:flex;align-items:center;justify-content:center;padding:60px 0;color:var(--muted);font-size:13px}
.dot-pulse{display:inline-flex;gap:4px;margin-left:8px}
.dot-pulse span{width:4px;height:4px;background:var(--muted);border-radius:50%;animation:pulse 1.2s ease-in-out infinite}
.dot-pulse span:nth-child(2){animation-delay:0.2s}
.dot-pulse span:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.status-bar{font-size:10px;color:var(--muted);padding:10px 0 4px;text-align:center}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <h1>SuperAssist MX</h1>
      <p id="today-label">Loading...</p>
    </div>
    <div class="topbar-right">&#9728; 06:21 &nbsp;&#9790; 17:59</div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab-btn" onclick="switchTab('dailyplan')">Daily plan</button>
    <button class="tab-btn" onclick="switchTab('staff')">Staff</button>
    <button class="tab-btn" onclick="switchTab('aircraft')">Aircraft</button>
  </div>
  <div id="tab-dashboard" class="tab-content active"><div class="loading">Loading<div class="dot-pulse"><span></span><span></span><span></span></div></div></div>
  <div id="tab-dailyplan" class="tab-content"><div class="loading">Loading<div class="dot-pulse"><span></span><span></span><span></span></div></div></div>
  <div id="tab-staff" class="tab-content"><div class="loading">Loading<div class="dot-pulse"><span></span><span></span><span></span></div></div></div>
  <div id="tab-aircraft" class="tab-content"><div class="loading">Loading<div class="dot-pulse"><span></span><span></span><span></span></div></div></div>
</div>

<div class="picker-overlay" id="picker-overlay" style="display:none">
  <div class="picker-sheet">
    <div class="picker-title" id="picker-title">Select start time</div>
    <div class="picker-grid" id="picker-grid"></div>
    <button class="picker-cancel" onclick="closePicker()">Cancel</button>
  </div>
</div>

<div class="month-view" id="month-view" style="display:none">
  <div class="month-header">
    <button class="month-back" onclick="closeMonthView()">← Back</button>
    <div class="month-title" id="month-view-title"></div>
    <span class="badge" id="month-view-badge"></span>
  </div>
  <div class="month-list" id="month-view-list"></div>
</div>

<div class="chat-bar">
  <div class="mic-hint" id="mic-hint"></div>
  <div class="chat-row">
    <input class="chat-input" id="chat-input" type="text" placeholder="Update status, add reminder, assign crew..." />
    <button class="chat-mic" id="mic-btn" aria-label="Voice input" onclick="toggleMic()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button class="chat-send" aria-label="Send" onclick="sendChat()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>

const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const BOWSER_MAX={1:3000,2:7000,3:10000,4:1400};

let appData={aircraft:[],flights:[],staff:[],dueItems:[],fuel:[],reminders:[]};

let stpExpanded=false;

function todayISO(){return new Date().toISOString().split('T')[0]}
function dateISO(d){return d.toISOString().split('T')[0]}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function fmtDate(d){return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`}

document.getElementById('today-label').textContent=fmtDate(new Date());

function switchTab(tab){

async function loadAll(){
  const today=todayISO();
  const [ac,fl,st,di,fu,rm]=await Promise.all([
    db.from('aircraft').select('*').order('registration'),
    db.from('flights').select('*').order('flight_date').order('departure_time'),

    db.from('reminders').select('*').eq('is_active',true).order('created_at',{ascending:false})

function detectConflict(reg,date){
  const iso=dateISO(date);
  const hasFlights=appData.flights.some(f=>f.aircraft_registration===reg&&f.flight_date===iso);
  const ac=appData.aircraft.find(a=>a.registration===reg);
  if(!ac||!hasFlights)return null;
  if(ac.status==='aog')return{type:'hard',msg:`${reg} is AOG but has flights scheduled`};
  if(ac.status==='mx')return{type:'hard',msg:`${reg} is in MX but has flights scheduled`};
  return null;
}

function getAllConflicts(){
  const out=[];
  const today=new Date();
  appData.aircraft.forEach(ac=>{
    for(let i=0;i<7;i++){
      const d=addDays(today,i);
      const c=detectConflict(ac.registration,d);
      if(c)out.push({...c,date:fmtShort(d)});
    }
  });
  return out;
}

function statusBadge(status){
  const map={aog:'badge-aog',['u/s']:'badge-us',mx:'badge-mx',serviceable:'badge-ok'};
  const label={aog:'AOG',['u/s']:'U/S',mx:'In MX',serviceable:'Serviceable'};
  return`<span class="badge ${map[status]||'badge-ok'}">${label[status]||'Serviceable'}</span>`;
}

// DASHBOARD

  const today=todayISO();

  urgent.slice(0,4).forEach(item=>{

    html+=`<div class="ac-card${c?' conflict':''}"><div class="ac-header"><span class="ac-reg">${ac.registration}</span>${statusBadge(ac.status)}${c?'<span class="conflict-flag">Conflict</span>':''}</div>`;
    if(ac.details)html+=`<div class="ac-detail-row">${ac.details}</div>`;
    if(acF.length>0){acF.forEach(f=>{html+=`<div class="flight-row"><span class="fl-time">${f.departure_time||''}</span><span class="fl-route">${f.route||''}</span>${f.is_vip?'<span class="badge badge-vip">VIP</span>':''}<span class="fl-pax">${f.pax_count>0?f.pax_count+' pax':''}</span></div>`})}
    else{html+=`<div class="no-flights">${ac.status==='aog'?'Grounded':ac.status==='mx'?'MX day':'No flights today'}</div>`}

  if(fuelEntries.length>0){

      html+=`<div class="fuel-card"><div class="fuel-b-label">Bowser ${f.bowser_number}</div><div class="fuel-b-val">${Number(f.level_litres).toLocaleString()} L</div><div class="fuel-b-max">of ${max.toLocaleString()} L</div><div class="fuel-bar-track"><div class="fuel-bar-fill" style="width:${pct}%;background:${fc}"></div></div></div>`;
    });

    html+=`<div class="fuel-total-card"><span class="fuel-total-label">Total available</span><span class="fuel-total-val">${total.toLocaleString()} L</span></div>`;
  }
  html+='<div class="sec-label">Reminders</div>';
  if(appData.reminders.length===0)html+='<p style="font-size:12px;color:var(--muted);font-style:italic">No reminders. Type one below.</p>';
  else appData.reminders.forEach(r=>{html+=`<div class="reminder-item">${r.content}</div>`});
  html+=`<div class="status-bar">Updated ${new Date().toLocaleTimeString('en-FJ',{hour:'2-digit',minute:'2-digit'})}</div>`;
  document.getElementById('tab-dashboard').innerHTML=html;

// stpTimes stores per-day overrides: { 'YYYY-MM-DD': { staffId: 'HH:MM', ... } }
const stpTimes={};

function getStpStaff(date){
  const iso=dateISO(date);
  // Use today's staff list as the roster for all days — same people, different times
  const base=appData.staff.filter(s=>s.shift_date===todayISO());
  // If we have actual data for this date, use it; otherwise use today's staff as template
  const dated=appData.staff.filter(s=>s.shift_date===iso);
  const staff=dated.length>0?dated:base;
  // Apply any day-specific time overrides stored in stpTimes
  const overrides=stpTimes[iso]||{};
  return staff.map(s=>({...s,shift_start:overrides[s.id]||s.shift_start,_planDate:iso}));
}

function renderSTP(date){
  const iso=dateISO(date);
  const stpStaff=getStpStaff(date);

  let html='<div class="sec-label" style="margin-bottom:0">Start time planner</div>';
  html+=`<div class="stp-toggle" onclick="toggleSTP()"><span class="stp-toggle-label">${fmtShort(date)}</span><span class="stp-toggle-btn" id="stp-btn">${stpExpanded?'Hide':'Edit times'}</span></div>`;

  if(stpExpanded){
    html+='<div class="stp-list" id="stp-list">';
    stpStaff.forEach(s=>{
      const hasTime=s.shift_start;
      html+=`<div class="stp-row" onclick="openPickerForDay('${s.id}','${s.name}','${s.shift_start||''}','${iso}')"><span class="stp-name">${s.name}</span><span class="stp-time${hasTime?'':' unset'}">${hasTime||'—'}</span></div>`;
    });
    html+='</div>';
  }

  // Draft — always visible, grouped by time
  const groups={};
  stpStaff.filter(s=>s.shift_start).sort((a,b)=>a.shift_start.localeCompare(b.shift_start)).forEach(s=>{
    const k=s.shift_start;
    if(!groups[k])groups[k]=[];
    groups[k].push(s.name.split(' ')[0]);
  });

  html+='<div class="draft-box" id="stp-draft"><div class="draft-label">Draft message</div><div class="draft-content" id="draft-content">';
  if(Object.keys(groups).length===0){
    html+='<span style="color:var(--muted);font-style:italic">Set start times above to generate draft</span>';
  } else {
    Object.keys(groups).sort().forEach(t=>{html+=`${t} ${groups[t].join(', ')}<br>`});
  }
  html+='</div><button class="copy-btn" onclick="copyDraft()">Copy to clipboard</button></div>';
  return html;
}

function toggleSTP(){
  stpExpanded=!stpExpanded;
  // Only re-render the STP section — preserve scroll position
  const container=document.getElementById('stp-container');
  if(container){
    container.innerHTML=renderSTP(currentPlanDate);
  }
}

function openPickerForDay(id,name,current,iso){
  const hours=['05:00','06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00'];
  document.getElementById('picker-title').textContent=`Start time — ${name}`;
  document.getElementById('picker-grid').innerHTML=hours.map(h=>`<div class="picker-opt${h===current?' selected':''}" onclick="selectTimeForDay('${id}','${h}','${iso}')">${h}</div>`).join('');
  document.getElementById('picker-overlay').style.display='flex';
}

async function selectTimeForDay(id,time,iso){
  if(!stpTimes[iso])stpTimes[iso]={};
  stpTimes[iso][id]=time;
  if(iso===todayISO()){await db.from("staff").update({shift_start:time}).eq("id",id);await loadAll();}
  closePicker();
  const container=document.getElementById("stp-container");
  if(container)container.innerHTML=renderSTP(currentPlanDate);
}

function closePicker(){document.getElementById('picker-overlay').style.display='none'}

function copyDraft(){
  const el=document.getElementById('draft-content');
  if(!el)return;
  const text=el.innerText.trim();
  if(!text||text.includes('Set start times'))return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.copy-btn');
    if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy to clipboard',2000)}
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    const btn=document.querySelector('.copy-btn');
    if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy to clipboard',2000)}
  });
}

function toggleCheck(i){
  document.getElementById(`check-${i}`)?.classList.toggle('done');
  document.getElementById(`cb-${i}`)?.classList.toggle('checked');
}

function addItem(type){
  const item=prompt(`Add ${type} item:`);
  if(item)alert(`Added: ${item}\n(Full persistence coming in next update)`);
}

function openMonthView(reg){
  const ac=appData.aircraft.find(a=>a.registration===reg);
  document.getElementById('month-view-title').textContent=`${reg} — June 2026`;
  document.getElementById('month-view-badge').className=`badge ${ac.status==='aog'?'badge-aog':ac.status==='mx'?'badge-mx':'badge-ok'}`;
  document.getElementById('month-view-badge').textContent=ac.status==='aog'?'AOG':ac.status==='mx'?'In MX':'Serviceable';
  const todayISO_=todayISO();
  let html='';
  for(let day=1;day<=30;day++){
    const d=new Date(2026,5,day);
    const diso=dateISO(d);
    const isToday=diso===todayISO_;
    const dayF=appData.flights.filter(f=>f.aircraft_registration===reg&&f.flight_date===diso);
    const conflict=detectConflict(reg,d);
    let content='',rowClass='';
    if(isToday)rowClass='today-row';
    if(conflict)rowClass='has-conflict';
    if(dayF.length>0){
      content=`&#9992;${dayF[0].departure_time||''} &#8600;${dayF[dayF.length-1].departure_time||''} ${dayF.length}s`;
      if(conflict)content+=` <span class="mr-conflict">⚠ Conflict</span>`;
    } else if(conflict){
      content=`<span class="mr-conflict">⚠ ${conflict.msg}</span>`;
    } else {
      content='<span class="mr-dash">—</span>';
    }
    html+=`<div class="month-row ${rowClass}"><span class="mr-date${isToday?' today-date':''}">${DAYS_S[d.getDay()]} ${day}</span><span class="mr-content">${content}</span></div>`;
  }
  document.getElementById('month-view-list').innerHTML=html;
  document.getElementById('month-view').style.display='block';
}

function closeMonthView(){document.getElementById('month-view').style.display='none'}

// CHAT
function sendChat(){
  const input=document.getElementById('chat-input');
  handleChat(input.value);
  input.value='';
}

document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat()});

async function handleChat(msg){
  msg=msg.trim();
  if(!msg)return;
  const lower=msg.toLowerCase();
  if(lower.includes('reminder')||lower.includes('remember')){
    const content=msg.replace(/add reminder[:\-]?\s*/i,'').replace(/remember[:\-]?\s*/i,'').replace(/reminder[:\-]?\s*/i,'');
    await db.from('reminders').insert({content,source:'chat'});
    await loadAll();
    return;
  }
  const regs=['dq-kpi','dq-omo','dq-isl'];
  const reg=regs.find(r=>lower.includes(r));
  if(reg){
    const status=lower.includes('aog')?'aog':lower.includes('u/s')?'u/s':lower.includes(' mx')?'mx':lower.includes('serviceable')?'serviceable':null;
    if(status){await db.from('aircraft').update({status,updated_at:new Date().toISOString()}).eq('registration',reg.toUpperCase());await loadAll();return}
  }
  alert('Try:\n• "DQ-ISL serviceable"\n• "DQ-KPI AOG"\n• "add reminder: your note"\n\nFull AI chat in next update.');
}

// VOICE — Safari-safe single-shot approach
function toggleMic(){
  const btn=document.getElementById('mic-btn');
  const hint=document.getElementById('mic-hint');
  if(recognition){
    recognition.stop();
    recognition=null;
    btn.classList.remove('listening');
    hint.textContent='';
    return;
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Voice input not supported on this browser. Try Chrome or Safari on iOS 17+.');return}
  try{
    recognition=new SR();
    recognition.lang='en-AU';
    recognition.interimResults=false;
    recognition.maxAlternatives=1;
    recognition.onstart=()=>{btn.classList.add('listening');hint.textContent='Listening... tap mic to stop'};
    recognition.onresult=e=>{
      const t=e.results[0][0].transcript;
      document.getElementById('chat-input').value=t;
      handleChat(t);
      btn.classList.remove('listening');
      hint.textContent='';
      recognition=null;
    };
    recognition.onerror=e=>{
      btn.classList.remove('listening');
      hint.textContent='';
      recognition=null;
      if(e.error!=='aborted')alert('Voice error: '+e.error+'. Try typing instead.');
    };
    recognition.onend=()=>{btn.classList.remove('listening');hint.textContent='';recognition=null};
    recognition.start();
  }catch(e){
    btn.classList.remove('listening');
    hint.textContent='';
    recognition=null;
    alert('Could not start voice input. Try typing instead.');
  }
}

loadAll();
